<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Baat Yeh Hai</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>

<body>

<div class="container">
    <div class="row justify-content-center w-100">
        <div class="col-md-8 col-lg-7">
            <div class="card glass-card shadow-lg">

                <!-- 🔥 UPDATED HEADER -->
                <div class="card-header d-flex justify-content-between align-items-center">

                    <div>
                        <h2 class="fw-bold mb-0">Main Baat Yeh Hai</h2>
                        <p class="small mb-0">AI Powered Smart Text Summarizer</p>
                    </div>

                    <button id="themeToggle" class="btn btn-sm btn-light">
                        🌙 Dark Mode
                    </button>

                </div>

                <div class="card-body rounded-bottom p-4">

                    <form id="summarizeForm" enctype="multipart/form-data">

                        <!-- INPUT MODE -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Choose Input Method</label>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="input_mode" value="text" checked>
                                <label class="form-check-label">Paste Text</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="input_mode" value="file">
                                <label class="form-check-label">Upload .txt File</label>
                            </div>
                        </div>

                        <!-- TEXT AREA -->
                        <div class="mb-4" id="textContainer">
                            <label class="form-label fw-semibold">Enter Text</label>
                            <textarea id="inputText"
                                      name="input_text"
                                      class="form-control"
                                      rows="8"
                                      placeholder="Paste up to 15,000 characters..."></textarea>
                            <div id="charCount" class="form-text text-muted">
                                0 characters (Limit: 15,000)
                            </div>
                        </div>

                        <!-- FILE UPLOAD -->
                        <div class="mb-4 d-none" id="fileContainer">
                            <label class="form-label fw-semibold">Upload .txt File</label>
                            <input type="file" class="form-control" name="uploaded_file" accept=".txt">
                            <div class="form-text">
                                Max file size: 1MB (first 15,000 characters summarized)
                            </div>
                        </div>

                        <!-- SUMMARY LENGTH -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Summary Length:
                                <span id="lengthValue">3</span> sentences
                            </label>
                            <input type="range"
                                   id="lengthSlider"
                                   name="num_sentences"
                                   class="form-range"
                                   min="2"
                                   max="15"
                                   value="3">
                        </div>

                        <!-- OUTPUT FORMAT -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Output Format</label>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="format_type" value="paragraph" checked>
                                <label class="form-check-label">Paragraph</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="format_type" value="bullets">
                                <label class="form-check-label">Bullet Points</label>
                            </div>
                        </div>

                        <!-- BUTTON -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary px-4">
                                Summarize
                            </button>
                        </div>

                    </form>

                    <!-- Loading -->
                    <div id="loadingIndicator" class="text-center mt-4 d-none">
                        <div class="spinner-border text-primary"></div>
                        <p class="small mt-2 text-white">Generating summary...</p>
                    </div>

                    <!-- Summary Result -->
                    <div id="summaryResult" class="mt-4 d-none">
                        <div class="card shadow-sm">

                            <div class="card-header d-flex justify-content-between align-items-center">
                                <span class="fw-semibold">Summary</span>
                                <div>
                                    <button id="downloadBtn" class="btn btn-sm btn-success me-2">
                                        Download
                                    </button>
                                    <button id="copyBtn" class="btn btn-sm btn-outline-secondary">
                                        Copy
                                    </button>
                                    <button id="historyBtn" class="btn btn-sm btn-dark ms-2">
                                        History
                                    </button>
                                </div>
                            </div>

                            <div class="card-body" id="summaryText"></div>

                        </div>
                    </div>

                    <!-- History Section -->
                    <div id="historySection" class="mt-3 d-none">
                        <div class="card shadow-sm">
                            <div class="card-header">
                                Summary History (Last 5)
                            </div>
                            <div class="card-body" id="historyContainer"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
